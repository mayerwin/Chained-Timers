apply plugin: 'com.android.application'

// Optional Play Store upload-key config. Generated by
// publishing/android/1-generate-upload-keystore.bat. When the file is
// missing (fresh checkout, CI, or sideload-only flow) we silently skip
// the play signingConfig and fall back to the sideload key for release
// builds — so `assembleDebug` and the GitHub-Actions sideload pipeline
// keep working unchanged.
def keystorePropertiesFile = rootProject.file('keystore.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}
def hasPlayKey = keystoreProperties['storeFile'] != null

android {
    namespace = "com.mayerwin.chainedtimers"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.mayerwin.chainedtimers"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        versionName "1.1.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // ------------------------------------------------------------------
    // Signing configurations.
    //
    // sideload — committed plaintext keystore, used for the GitHub-
    //   Releases APK and any local debug build. Anyone forking the repo
    //   gets the same key, which is intentional for sideload distribution:
    //   subsequent APK versions install in-place over each other rather
    //   than failing as "different developer".
    //
    // play — Play Store upload key. NOT committed. Generated locally by
    //   publishing/android/1-generate-upload-keystore.bat, which writes
    //   the keystore to repo root and a properties file (referenced
    //   above) to android/keystore.properties. If keystore.properties
    //   doesn't exist, this signingConfig is omitted from the build and
    //   release builds fall back to the sideload key — so the gradle
    //   project always parses cleanly even on a fresh checkout.
    // ------------------------------------------------------------------
    signingConfigs {
        sideload {
            storeFile     file('../sideload.keystore')
            storePassword 'sideload'
            keyAlias      'chainedtimers'
            keyPassword   'sideload'
            storeType     'PKCS12'
        }
        if (hasPlayKey) {
            play {
                // rootProject.file() resolves relative to the Gradle root
                // (android/), which matches the convention used by
                // keystore.properties (storeFile=../upload.keystore -> repo
                // root). Plain file() resolves relative to the app module
                // (android/app/) and would expect the keystore one level
                // higher, which is wrong.
                storeFile     rootProject.file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias      keystoreProperties['keyAlias']
                keyPassword   keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.sideload
        }
        release {
            // Use the play upload key when it's been generated locally,
            // otherwise fall back to sideload so the gradle build still
            // succeeds in CI / fresh-checkout scenarios.
            signingConfig hasPlayKey ? signingConfigs.play : signingConfigs.sideload
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
